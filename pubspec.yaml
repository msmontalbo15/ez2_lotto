name: ez2_lotto
description: EZ2 / 2D Lotto PCSO Results App - Track live draws, history, statistics, and check your tickets
publish_to: 'none'
version: 1.0.1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.6
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  shimmer: ^3.0.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# ── App Icon (root level — NOT inside flutter:) ───────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false

# ── Splash Screen (root level — NOT inside flutter:) ─────────
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/app_icon.png
  android_12:
    image: assets/icon/app_icon.png
    icon_background_color: "#FFFFFF"
  fullscreen: false