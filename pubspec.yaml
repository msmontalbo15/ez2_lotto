name: ez2_lotto
description: EZ2 / 2D Lotto PCSO Results App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # Supabase
  supabase_flutter: ^2.5.6

  # State management
  provider: ^6.1.2

  # Image picker (for ticket checker)
  image_picker: ^1.1.2

  # Intl for date formatting
  intl: ^0.19.0

  # Shimmer loading effect
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true